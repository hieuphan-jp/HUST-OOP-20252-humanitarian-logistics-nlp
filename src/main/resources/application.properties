# CẤU HÌNH VẬN HÀNH ỨNG DỤNG (Không chứa thông tin bảo mật)

# 1. Cấu hình phân tích dữ liệu (Analysis Configuration)
# Số lượng bài viết/bình luận xử lý trong 1 mẻ (Tránh tràn RAM)
analysis.batch.size=100
# Số luồng chạy song song để tăng tốc độ phân tích NLP
analysis.max.threads=4

# 2. Cấu hình giới hạn AI (AI Configuration)
# Giới hạn số lượng nạp vào AI để tránh vượt quá token và tốn tiền API
ai.max.posts=15
ai.max.comments=15
ai.timeout.seconds=60

# 3. Cấu hình Giao diện (UI Configuration)
ui.theme=default
ui.language=vi

# 4. Cấu hình Xuất báo cáo (Export Configuration)
# Mặc định lưu file xuất ra vào thư mục Documents/DisasterReports của máy tính
export.default.directory=${user.home}/Documents/DisasterReports
export.max.file.size.mb=100
export.timeout.seconds=300